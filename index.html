<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Color Converter</title>

<style>
body {
  background: linear-gradient(135deg, #0f172a, #020617);
  color: white;
  text-align: center;
  font-family: Arial;
}

h1 {
  margin-top: 50px;
}

input {
  width: 150px;
  height: 60px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}

.box {
  margin-top: 20px;
  font-size: 20px;
  background: #111;
  padding: 20px;
  border-radius: 10px;
  display: inline-block;
}
</style>

</head>
<body>

<h1>🎨 Color to Code</h1>

<input type="color" id="colorPicker">

<div class="box" id="result">
HEX: #ffffff
</div>

<script>
const picker = document.getElementById("colorPicker");
const result = document.getElementById("result");

picker.addEventListener("input", () => {
  const color = picker.value;
  result.innerHTML = "HEX: " + color;
});
</script>

</body>
</html>
